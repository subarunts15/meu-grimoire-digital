<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Reino Digital 🏰</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --main-red: #ff0000; --main-green: #00ff00; --bg-dark: #000; --panel: #0a0a0a; 
        }
        
        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); color: white; 
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'),
                radial-gradient(circle at 10% 20%, rgba(255, 0, 0, 0.1) 0%, transparent 25%);
        }

        /* BARRA SUPERIOR */
        .top-bar { 
            display: flex; align-items: center; padding: 15px 25px; background: #050505; 
            border-bottom: 2px solid #1a1a1a; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; 
        }

        .icon-group { display: flex; align-items: center; gap: 22px; }
        .icon-btn { font-size: 22px; cursor: pointer; color: #fff; transition: 0.3s; }
        .icon-btn:hover { color: var(--main-red); transform: scale(1.1); }

        .search-container { 
            display: flex; align-items: center; background: #0f0f0f; border-radius: 10px; 
            padding: 8px 18px; flex-grow: 1; max-width: 450px; margin: 0 25px; border: 1px solid #222; 
        }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 100%; margin-left: 10px; }

        /* LOGIN */
        .login-box { 
            width: 35px; height: 35px; border: 2px solid var(--main-red); 
            background: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .login-box.active-user { border-color: var(--main-green); box-shadow: 0 0 10px var(--main-green); color: var(--main-green); }

        /* MODAL E TELAS */
        .modal, .game-overlay { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #000; border: 2px solid var(--main-red); padding: 35px; z-index: 2000; 
            width: 340px; border-radius: 15px; text-align: center;
        }
        .show { display: block !important; }
        
        .game-overlay { width: 90%; max-width: 500px; height: 400px; border-color: var(--main-red); }

        .btn-action { width: 100%; padding: 12px; margin: 6px 0; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-family: inherit; }
        .btn-confirm { background: var(--main-red); color: white; }
        .btn-ghost { background: transparent; border: 1px solid white; color: white; }

        /* CONTEÚDO */
        .main-content { padding: 140px 20px; text-align: center; }
        #resultArea { 
            margin-top: 30px; padding: 25px; border-radius: 15px;
            background: rgba(255, 0, 0, 0.05); border: 1px solid rgba(255, 0, 0, 0.1);
            color: #eee; display: none;
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1999; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="icon-group">
            <i class="fas fa-bars icon-btn" onclick="toggleSidebar()"></i>
            <i class="fas fa-gamepad icon-btn" onclick="openGame()" title="Teste de QI"></i>
        </div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Consultar Oráculo..." id="searchInp">
        </div>

        <div class="icon-group">
            <i class="fas fa-history icon-btn" onclick="openModal('histModal')"></i>
            <i class="fas fa-crown icon-btn" onclick="openModal('admModal')"></i>
        </div>

        <div class="login-box" id="userBox" onclick="openModal('logModal')"><i class="fas fa-user"></i></div>
    </div>

    <div class="main-content">
        <div style="max-width: 800px; margin: 0 auto; background: rgba(10,10,10,0.9); padding: 50px; border-radius: 20px; border: 1px solid #111;">
            <h1 id="displayTitle">Reino de Magia Digital</h1>
            <p id="displayText">O conhecimento aguarda o mestre.</p>
            <div id="resultArea"></div>
        </div>
    </div>

    <div id="gameModal" class="game-overlay">
        <div id="gameLobby">
            <h2 style="color:var(--main-red)">ARENA DE QI</h2>
            <p>Prove sua sabedoria para o Oráculo.</p>
            <button class="btn-action btn-confirm" onclick="startCountdown()">JOGAR (PLAY)</button>
            <button class="btn-action btn-ghost" onclick="closeAll()">VOLTAR</button>
        </div>
        <div id="gamePlay" style="display:none">
            <h1 id="timer" style="font-size: 50px; color: var(--main-red);">3</h1>
            <div id="quizContent" style="display:none">
                <p id="questionText">Carregando enigma...</p>
                <div id="options"></div>
            </div>
        </div>
    </div>

    <div id="admModal" class="modal">
        <h3>Portal Admin</h3>
        <input type="password" id="admKey" placeholder="SENHA" style="width:100%; padding:10px; margin:10px 0; background:#0a0a0a; border:1px solid #333; color:white;">
        <button class="btn-action btn-confirm" onclick="checkAdm()">ENVIAR</button>
        <button class="btn-action btn-ghost" onclick="closeAll()">VOLTAR</button>
    </div>

    <div id="logModal" class="modal">
        <h3 id="logTitle">Acesso</h3>
        <div id="authInputs">
            <input type="text" id="uName" placeholder="NOME" style="width:100%; padding:10px; margin:10px 0; background:#0a0a0a; border:1px solid #333; color:white;">
            <input type="password" id="uPass" placeholder="SENHA" style="width:100%; padding:10px; margin:10px 0; background:#0a0a0a; border:1px solid #333; color:white;">
            <button class="btn-action btn-confirm" onclick="doAuth('login')">ENTRAR</button>
            <button class="btn-action btn-ghost" onclick="doAuth('reg')">CADASTRAR</button>
        </div>
        <div id="loggedOptions" style="display:none">
            <p id="whoIs"></p>
            <button class="btn-action btn-confirm" style="background:#444" onclick="doLogout()">SAIR</button>
            <button class="btn-action btn-ghost" onclick="closeAll()">VOLTAR</button>
        </div>
    </div>

    <div id="histModal" class="modal">
        <h3>Memórias</h3>
        <div id="hList" style="max-height: 200px; overflow-y: auto; text-align: left;"></div>
        <button class="btn-action btn-ghost" onclick="closeAll()">VOLTAR</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <script>
        let loggedUser = null;
        let accounts = JSON.parse(localStorage.getItem('reino_contas') || "{}");

        function openModal(id) { closeAll(); document.getElementById(id).classList.add('show'); document.getElementById('overlay').classList.add('active'); }
        function openGame() { openModal('gameModal'); }
        function closeAll() { 
            document.querySelectorAll('.modal, .game-overlay').forEach(m => m.classList.remove('show')); 
            document.getElementById('overlay').classList.remove('active');
            resetGame();
        }

        // LÓGICA DO JOGO DE QI
        function startCountdown() {
            document.getElementById('gameLobby').style.display = 'none';
            document.getElementById('gamePlay').style.display = 'block';
            let count = 3;
            const t = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = count > 0 ? count : "GO!";
                if(count < 0) {
                    clearInterval(t);
                    document.getElementById('timer').style.display = 'none';
                    document.getElementById('quizContent').style.display = 'block';
                    loadQuestion();
                }
            }, 1000);
        }

        function loadQuestion() {
            document.getElementById('questionText').innerText = "Quanto é 2 + 2 no mundo binário?";
            document.getElementById('options').innerHTML = `
                <button class="btn-action btn-ghost" onclick="alert('Acertou!')">100</button>
                <button class="btn-action btn-ghost" onclick="alert('Errou!')">4</button>
            `;
        }

        function resetGame() {
            document.getElementById('gameLobby').style.display = 'block';
            document.getElementById('gamePlay').style.display = 'none';
            document.getElementById('timer').style.display = 'block';
            document.getElementById('timer').innerText = "3";
            document.getElementById('quizContent').style.display = 'none';
        }

        // PESQUISA
        document.getElementById('searchInp').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const q = document.getElementById('searchInp').value;
                const r = "✨ Oráculo: Revelação selada sobre '" + q + "'.";
                const area = document.getElementById('resultArea');
                area.innerText = r; area.style.display = 'block';
                if(loggedUser) {
                    accounts[loggedUser].searches.unshift({q, r});
                    localStorage.setItem('reino_contas', JSON.stringify(accounts));
                }
            }
        });

        // ADMIN E AUTH (SIMPLIFICADO PARA O EXEMPLO)
        function checkAdm() { if(document.getElementById('admKey').value === '15092011') alert("Admin OK!"); closeAll(); }
        
        function doAuth(type) {
            const n = document.getElementById('uName').value;
            const s = document.getElementById('uPass').value;
            if(type === 'reg') { accounts[n] = {pass: s, searches: []}; localStorage.setItem('reino_contas', JSON.stringify(accounts)); alert("Salvo!"); }
            else if(accounts[n] && accounts[n].pass === s) { 
                loggedUser = n; 
                document.getElementById('userBox').classList.add('active-user');
                document.getElementById('authInputs').style.display = 'none';
                document.getElementById('loggedOptions').style.display = 'block';
                document.getElementById('whoIs').innerText = "Mestre: " + n;
                closeAll();
            }
        }

        function doLogout() {
            loggedUser = null;
            document.getElementById('userBox').classList.remove('active-user');
            document.getElementById('authInputs').style.display = 'block';
            document.getElementById('loggedOptions').style.display = 'none';
            document.getElementById('resultArea').style.display = 'none';
            closeAll();
        }
    </script>
</body>
</html>
