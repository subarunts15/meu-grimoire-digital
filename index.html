<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Master - ADM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #ffffff;
            --admin-red: #ff0000;
            --card-bg: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--accent-color);
            overflow-x: hidden;
        }

        /* Header e Menu */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: #0a0a0a;
            border-bottom: 1px solid #333;
        }

        .user-info {
            font-size: 14px;
            font-weight: bold;
        }

        .menu-icon {
            cursor: pointer;
            font-size: 24px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100%;
            background: #111;
            transition: 0.4s;
            z-index: 1000;
            padding-top: 60px;
            border-left: 1px solid #333;
        }

        .sidebar.active {
            right: 0;
        }

        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        .menu-item:hover {
            background: #222;
        }

        /* Imagem Inicial */
        .hero-banner {
            width: 100%;
            height: 300px;
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* Quiz de QI */
        #quiz-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .option-btn:hover {
            background: #555;
        }

        /* Painel Administrativo Fullscreen */
        #admin-auth-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: #111;
            padding: 30px;
            border: 1px solid #333;
            text-align: center;
            border-radius: 10px;
        }

        #full-admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 3000;
            border-left: 5px solid var(--admin-red);
            border-right: 5px solid var(--admin-red);
            overflow-y: auto;
        }

        .admin-header {
            text-align: center;
            padding: 20px;
            font-size: 24px;
            letter-spacing: 5px;
            border-bottom: 1px solid #222;
        }

        .code-area-container {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #0a0a0a;
            color: #00ff00;
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 10px;
            font-family: monospace;
            resize: vertical;
        }

        .admin-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-add { background: #28a745; color: white; }
        .btn-rem { background: #dc3545; color: white; }
        .btn-save { background: #007bff; color: white; }
    </style>
</head>
<body>

    <header>
        <div class="user-info">NÍVEL: <span id="player-level">1</span></div>
        <div class="menu-icon" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="menu-item" onclick="showSection('home')">
            <i class="fas fa-home"></i> Início
        </div>
        <div class="menu-item" onclick="showSection('quiz')">
            <i class="fas fa-brain"></i> Teste de QI
        </div>
        <div class="menu-item" onclick="openAdminAuth()">
            <i class="fas fa-crown"></i> Admin
        </div>
    </div>

    <main id="main-content">
        <section id="home-section">
            <div class="hero-banner">
                <h1 style="text-shadow: 2px 2px 10px #000;">BEM-VINDO AO PORTAL</h1>
            </div>
            <p style="text-align: center;">Selecione uma opção no menu lateral para começar.</p>
        </section>

        <section id="quiz-section" style="display:none;">
            <div id="quiz-container">
                <h2 id="question-text">Carregando pergunta...</h2>
                <div class="options-grid" id="options-container"></div>
            </div>
        </section>
    </main>

    <div id="admin-auth-overlay">
        <div class="auth-card">
            <h3>ACESSO RESTRITO</h3>
            <p>Criar Conta de Administrador</p>
            <input type="password" id="adm-pass" placeholder="Senha de Acesso" style="padding: 10px; margin-bottom: 10px;"><br>
            <button onclick="loginAdmin()" style="background: white; color: black;">LOGAR</button>
            <button onclick="closeAdminAuth()" style="background: #333; color: white;">FECHAR</button>
        </div>
    </div>

    <div id="full-admin-panel">
        <div class="admin-header">ADM</div>
        <div class="code-area-container" id="editor-container">
            <textarea placeholder="Escreva seu código ou texto aqui..."></textarea>
        </div>
        <div class="admin-controls">
            <button class="btn-add" onclick="addTextArea()"><i class="fas fa-plus"></i></button>
            <button class="btn-rem" onclick="removeTextArea()"><i class="fas fa-minus"></i></button>
            <button class="btn-save" onclick="saveAndExit()">SALVAR E FECHAR</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DO MENU ---
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function showSection(section) {
            document.getElementById('home-section').style.display = section === 'home' ? 'block' : 'none';
            document.getElementById('quiz-section').style.display = section === 'quiz' ? 'block' : 'none';
            toggleMenu();
            if(section === 'quiz') startQuiz();
        }

        // --- LÓGICA DO QUIZ (10 Perguntas Aleatórias) ---
        const allQuestions = [
            { q: "Qual o próximo número: 2, 4, 8, 16...?", a: ["32", "24", "64", "20"], correct: 0 },
            { q: "Se todos os humanos respiram, e João é humano, João...?", a: ["Corre", "Respira", "Voa", "Dorme"], correct: 1 },
            { q: "Qual palavra não combina: Maçã, Banana, Carro, Uva?", a: ["Maçã", "Banana", "Carro", "Uva"], correct: 2 },
            { q: "Ouro está para AU, assim como Prata está para...?", a: ["Fe", "Ag", "Pb", "Cu"], correct: 1 },
            { q: "Qual a raiz quadrada de 144?", a: ["10", "14", "12", "16"], correct: 2 },
            { q: "Se hoje é segunda, que dia será daqui a 3 dias?", a: ["Quinta", "Sexta", "Quarta", "Sábado"], correct: 0 },
            { q: "Qual o oceano mais profundo?", a: ["Atlântico", "Índico", "Pacífico", "Ártico"], correct: 2 },
            { q: "Planeta mais próximo do sol?", a: ["Terra", "Marte", "Vênus", "Mercúrio"], correct: 3 },
            { q: "8 / 2 * (2 + 2) = ?", a: ["16", "1", "8", "4"], correct: 0 },
            { q: "Qual o antônimo de Efêmero?", a: ["Curto", "Rápido", "Eterno", "Triste"], correct: 2 }
        ];

        let currentQuizQuestions = [];
        let currentStep = 0;
        let score = 0;

        function startQuiz() {
            currentQuizQuestions = [...allQuestions].sort(() => Math.random() - 0.5);
            currentStep = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            if(currentStep >= 10) {
                document.getElementById('question-text').innerText = "Fim do Teste! QI Processado.";
                document.getElementById('options-container').innerHTML = `<button onclick="startQuiz()" class="option-btn">Reiniciar</button>`;
                return;
            }
            const item = currentQuizQuestions[currentStep];
            document.getElementById('question-text').innerText = item.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            item.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            if(idx === currentQuizQuestions[currentStep].correct) {
                score++;
                let level = parseInt(document.getElementById('player-level').innerText);
                document.getElementById('player-level').innerText = level + 1;
            }
            currentStep++;
            showQuestion();
        }

        // --- LÓGICA DO PAINEL ADM ---
        function openAdminAuth() {
            document.getElementById('admin-auth-overlay').style.display = 'flex';
            toggleMenu();
        }

        function closeAdminAuth() {
            document.getElementById('admin-auth-overlay').style.display = 'none';
        }

        function loginAdmin() {
            // Aqui você pode definir uma senha, ex: 123
            document.getElementById('admin-auth-overlay').style.display = 'none';
            document.getElementById('full-admin-panel').style.display = 'block';
        }

        function addTextArea() {
            const container = document.getElementById('editor-container');
            const newText = document.createElement('textarea');
            newText.placeholder = "Nova barra de escrita...";
            container.appendChild(newText);
        }

        function removeTextArea() {
            const container = document.getElementById('editor-container');
            if (container.children.length > 1) {
                container.removeChild(container.lastChild);
            }
        }

        function saveAndExit() {
            alert("Informações salvas na conta administrativa!");
            document.getElementById('full-admin-panel').style.display = 'none';
            showSection('home');
        }
    </script>
</body>
</html>
