<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Reino Digital 🏰</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --main-red: #ff0000; 
            --main-green: #00ff00;
            --bg-dark: #050505; 
            --panel: rgba(18, 18, 18, 0.95); 
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
        }

        /* BARRA SUPERIOR ACONCHEGANTE */
        .top-bar { 
            display: flex; align-items: center; padding: 10px 25px; 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,0,0,0.2); 
            position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; 
        }

        .icon-btn { font-size: 20px; cursor: pointer; color: #fff; transition: 0.3s; margin-right: 20px; }
        .icon-btn:hover { color: var(--main-red); transform: scale(1.1); text-shadow: 0 0 10px var(--main-red); }

        .search-container { 
            display: flex; align-items: center; background: var(--glass); 
            border-radius: 20px; padding: 8px 15px; flex-grow: 1; 
            max-width: 500px; margin: 0 20px; border: 1px solid rgba(255,255,255,0.1); 
        }
        .search-container input { background: transparent; border: none; color: white; outline: none; width: 100%; margin-left: 10px; }

        /* BOTÃO LOGIN QUADRADO */
        .login-wrapper { text-align: center; cursor: pointer; }
        .login-box { 
            width: 35px; height: 35px; border: 2px solid var(--main-red); 
            background: black; border-radius: 5px; margin-bottom: 2px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .login-box.logged { border-color: var(--main-green); box-shadow: 0 0 10px var(--main-green); }
        .login-wrapper span { font-size: 10px; text-transform: uppercase; font-weight: bold; color: white; }

        /* MENU LATERAL */
        .sidebar { 
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%; 
            background: var(--panel); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1001; padding-top: 80px; border-right: 1px solid rgba(255,0,0,0.3);
        }
        .sidebar.active { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }

        /* ABAS E MODAIS */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #000; border: 2px solid var(--main-red); padding: 30px; 
            z-index: 5000; width: 320px; border-radius: 15px; box-shadow: 0 0 30px rgba(255,0,0,0.3); 
        }
        .modal.active { display: block; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: translate(-50%, -45%); opacity: 0; } }

        .modal input { 
            display: block; width: 100%; margin: 15px 0; padding: 12px; 
            background: #111; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;
        }
        .btn-row { display: flex; gap: 10px; }
        .action-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 5px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-red { background: var(--main-red); color: white; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }

        /* CONTEÚDO PRINCIPAL */
        .content { padding: 120px 20px; text-align: center; transition: 0.5s; }
        .hero { 
            background: rgba(20, 0, 0, 0.4); padding: 60px; border-radius: 30px; 
            border: 1px solid rgba(255,0,0,0.1); display: inline-block;
        }

        .history-item { 
            background: #111; padding: 15px; margin: 10px 0; border-radius: 10px; 
            cursor: pointer; border: 1px solid #222; transition: 0.3s; text-align: left;
        }
        .history-item:hover { border-color: var(--main-red); background: #1a0000; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="top-bar">
        <i class="fas fa-bars icon-btn" onclick="toggleSidebar()"></i>
        <i class="fas fa-gamepad icon-btn" onclick="alert('Inicie o Jogo pelo Menu!')"></i>
        
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Consultar o Destino..." id="searchField">
        </div>

        <i class="fas fa-history icon-btn" title="Histórico" onclick="openModal('historyModal')"></i>
        <i class="fas fa-crown icon-btn" title="Admin" onclick="openModal('adminModal')"></i>

        <div class="login-wrapper" onclick="openModal('loginModal')">
            <div class="login-box" id="loginIndicator"><i class="fas fa-user" style="font-size: 14px;"></i></div>
            <span id="loginText">Login</span>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding: 20px;">
            <h3>Reino de <span id="userNameDisplay">Viajante</span></h3>
            <p style="font-size: 12px; color: #888;">Suas memórias estão seladas aqui.</p>
        </div>
    </div>

    <div class="content">
        <div class="hero">
            <h1 id="mainTitle">O Despertar do Grimório</h1>
            <p id="mainDesc">Bem-vindo ao seu refúgio digital, mestre.</p>
            <div id="aiResponse" style="margin-top: 20px; color: #ccc; font-style: italic;"></div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <h2 style="color: var(--main-red); margin-top: 0;">Portal de Acesso</h2>
        <input type="text" id="regUser" placeholder="Nome do Mestre">
        <input type="password" id="regPass" placeholder="Senha Sagrada">
        <div class="btn-row">
            <button class="action-btn btn-outline" onclick="handleAuth('register')">CADASTRAR</button>
            <button class="action-btn btn-red" onclick="handleAuth('login')">ENTRAR</button>
        </div>
    </div>

    <div id="historyModal" class="modal" style="width: 400px;">
        <h2 style="color: var(--main-red);">Memórias de Busca</h2>
        <div id="historyList" style="max-height: 300px; overflow-y: auto;"></div>
        <button class="action-btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeAll()">FECHAR</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <script>
        let currentUser = null;
        let db = JSON.parse(localStorage.getItem('reino_users') || "{}");

        // NAVEGAÇÃO
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function openModal(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); }
        function closeAll() { 
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // SISTEMA DE LOGIN E PERSISTÊNCIA
        function handleAuth(type) {
            const u = document.getElementById('regUser').value;
            const p = document.getElementById('regPass').value;

            if(!u || !p) return alert("Preencha os campos!");

            if(type === 'register') {
                db[u] = { password: p, history: [], settings: {} };
                localStorage.setItem('reino_users', JSON.stringify(db));
                alert("Conta selada com sucesso!");
            } else {
                if(db[u] && db[u].password === p) {
                    currentUser = u;
                    loginSucess();
                } else {
                    alert("Dados incorretos!");
                }
            }
        }

        function loginSucess() {
            document.getElementById('loginIndicator').classList.add('logged');
            document.getElementById('loginText').innerText = "Online";
            document.getElementById('userNameDisplay').innerText = currentUser;
            document.getElementById('mainTitle').innerText = "Bem-vindo, " + currentUser;
            loadUserData();
            closeAll();
        }

        function loadUserData() {
            const history = db[currentUser].history || [];
            updateHistoryUI(history);
        }

        // PESQUISA E HISTÓRICO
        const searchField = document.getElementById('searchField');
        searchField.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && currentUser) {
                const query = searchField.value;
                const response = "O Oráculo revela segredos sobre: " + query;
                
                // Salva no DB do usuário
                db[currentUser].history.unshift({q: query, r: response});
                localStorage.setItem('reino_users', JSON.stringify(db));
                
                document.getElementById('aiResponse').innerText = response;
                updateHistoryUI(db[currentUser].history);
            } else if (!currentUser) {
                alert("Faça login para salvar suas pesquisas!");
            }
        });

        function updateHistoryUI(history) {
            const list = document.getElementById('historyList');
            list.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="restoreSearch(${index})">
                    <strong>🔍 ${item.q}</strong><br>
                    <small style="color: #666">Clique para restaurar</small>
                </div>
            `).join('');
        }

        function restoreSearch(index) {
            const item = db[currentUser].history[index];
            document.getElementById('aiResponse').innerText = item.r;
            document.getElementById('mainTitle').innerText = "Memória Restaurada";
            closeAll();
        }
    </script>
</body>
</html>
