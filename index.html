<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soberano do Reino Digital 🏰 | Console de Comando</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================================================
           SEÇÃO 1: ARQUITETURA DE CORES E DESIGN (THEME ENGINE)
           ============================================================ */
        :root {
            --sangue-primario: #ff0000;
            --verde-vital: #00ff00;
            --vazio-absoluto: #000000;
            --cinza-sombrio: #0a0a0a;
            --ouro-real: #ffd700;
            --borda-mistica: 2px solid #1a1a1a;
            --sombra-glow: 0 0 25px rgba(255, 0, 0, 0.4);
            --fonte-admin: 'Courier New', Courier, monospace;
        }

        /* ============================================================
           SEÇÃO 2: ANIMAÇÕES DE AMBIENTE (KEYFRAMES)
           ============================================================ */
        @keyframes fumaçaEntrada {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes brilhoTrono {
            0% { box-shadow: 0 0 10px var(--sangue-primario); }
            50% { box-shadow: 0 0 40px var(--sangue-primario); }
            100% { box-shadow: 0 0 10px var(--sangue-primario); }
        }

        /* ============================================================
           SEÇÃO 3: RESET E ESTRUTURA GLOBAL
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--vazio-absoluto);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* ============================================================
           SEÇÃO 4: HEADER DE ALTA PERFORMANCE (UI/UX)
           ============================================================ */
        .header-soberano {
            height: 110px;
            background: rgba(5, 5, 5, 0.98);
            border-bottom: 3px solid #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(25px);
        }

        .perfil-mestre {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .circulo-lvl {
            width: 70px;
            height: 70px;
            border: 3px solid var(--verde-vital);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 255, 0, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .circulo-lvl span {
            font-size: 10px;
            font-weight: bold;
            color: var(--verde-vital);
        }

        .circulo-lvl strong {
            font-size: 22px;
        }

        .barra-busca-oraculo {
            flex: 1;
            max-width: 600px;
            margin: 0 50px;
            position: relative;
        }

        .barra-busca-oraculo input {
            width: 100%;
            padding: 18px 30px;
            background: #080808;
            border: 1px solid #222;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            transition: 0.5s;
        }

        .barra-busca-oraculo input:focus {
            border-color: var(--sangue-primario);
            box-shadow: var(--sombra-glow);
            outline: none;
        }

        /* ============================================================
           SEÇÃO 5: MENU LATERAL (DRAWER)
           ============================================================ */
        .sidebar-reino {
            position: fixed;
            left: -350px;
            top: 0;
            width: 320px;
            height: 100%;
            background: var(--cinza-sombrio);
            border-right: 4px solid var(--sangue-primario);
            z-index: 2000;
            padding-top: 130px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .sidebar-reino.active {
            left: 0;
        }

        .menu-link {
            padding: 25px 45px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #666;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid #111;
            transition: 0.4s;
            cursor: pointer;
        }

        .menu-link:hover {
            color: #fff;
            background: #1a0000;
            padding-left: 60px;
        }

        .menu-link i {
            font-size: 20px;
            color: var(--sangue-primario);
        }

        /* ============================================================
           SEÇÃO 6: O PAINEL DO TRONO (ADMINISTRATIVO SUPREMO)
           ============================================================ */
        #painel-trono-fullscreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            /* LISTRAS VERMELHAS LATERAIS SOLICITADAS */
            border-left: 25px solid var(--sangue-primario);
            border-right: 25px solid var(--sangue-primario);
            overflow-y: auto;
            padding: 100px;
        }

        .trono-container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fumaçaEntrada 0.8s ease;
        }

        .titulo-trono {
            text-align: center;
            font-size: 80px;
            letter-spacing: 20px;
            margin-bottom: 100px;
            text-shadow: 0 0 50px var(--sangue-primario);
            font-weight: 900;
        }

        .decreto-input-group {
            background: #050505;
            border: 1px solid #222;
            padding: 50px;
            margin-bottom: 40px;
            border-radius: 15px;
            position: relative;
        }

        .decreto-input-group textarea {
            width: 100%;
            min-height: 250px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 22px;
            font-family: var(--fonte-admin);
            resize: none;
            outline: none;
        }

        .controles-trono {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.8);
            padding: 20px 50px;
            border-radius: 100px;
            border: 1px solid #333;
        }

        .btn-acao-real {
            padding: 15px 40px;
            background: transparent;
            color: white;
            border: 2px solid white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-acao-real:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
        }

        /* ============================================================
           SEÇÃO 7: ARENA DE QI (SISTEMA DE JOGO)
           ============================================================ */
        .modal-mistico {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            background: #000;
            border: 2px solid var(--sangue-primario);
            padding: 60px;
            z-index: 5000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            text-align: center;
        }

        .pergunta-card {
            font-size: 26px;
            margin-bottom: 40px;
            color: #ccc;
        }

        .grade-opcoes {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn-opcao-jogo {
            padding: 20px;
            background: #080808;
            border: 1px solid #333;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-opcao-jogo:hover {
            border-color: var(--sangue-primario);
            background: rgba(255, 0, 0, 0.1);
        }

        /* ============================================================
           SEÇÃO 8: SISTEMA DE INVENTÁRIO (RPG)
           ============================================================ */
        .inventario-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 30px;
        }

        .slot-item {
            width: 80px;
            height: 80px;
            background: #111;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #444;
        }

        .slot-cheio {
            color: var(--ouro-real);
            border-color: var(--ouro-real);
            text-shadow: 0 0 10px var(--ouro-real);
        }

        /* OVERLAY GLOBAL */
        .overlay-sombrio {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1500;
            backdrop-filter: blur(10px);
        }

    </style>
</head>
<body>

    <header class="header-soberano">
        <div class="perfil-mestre">
            <i class="fas fa-bars" style="font-size: 32px; cursor: pointer;" onclick="toggleMenu()"></i>
            <div class="circulo-lvl">
                <span>PODER</span>
                <strong id="display-lvl">1</strong>
            </div>
            <div>
                <h2 id="nome-usuario" style="letter-spacing: 2px;">MESTRE</h2>
                <div style="width: 120px; height: 5px; background: #222; border-radius: 10px; margin-top: 5px;">
                    <div id="progresso-exp" style="width: 10%; height: 100%; background: var(--verde-vital); box-shadow: 0 0 10px var(--verde-vital);"></div>
                </div>
            </div>
        </div>

        <div class="barra-busca-oraculo">
            <input type="text" id="input-oraculo" placeholder="Consulte o Oráculo do Reino Digital...">
            <i class="fas fa-dharm
